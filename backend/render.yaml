# Render Configuration for Backend Deployment
services:
  - type: web
    name: spotlight-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn spotlight_project.wsgi:application
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: spotlight-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://spotlight-frontend.onrender.com

  - type: pserv
    name: spotlight-postgres
    plan: free
